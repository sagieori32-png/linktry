<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>„Ф„Ь„Щ„†„І„Щ„Э „©„Ь„Щ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #21253a;
    --border: #2a2f45;
    --border-hover: #4a5280;
    --accent: #6c63ff;
    --accent-2: #ff6584;
    --accent-3: #43e97b;
    --text: #e8eaf6;
    --text-soft: #9ca3c8;
    --text-muted: #5a6080;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Header ---- */
  header {
    padding: 40px 32px 0;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-title {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  }

  .add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(108,99,255,0.5);
    background: #7b73ff;
  }

  /* ---- Search ---- */
  .search-wrap {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 32px;
  }

  .search-input {
    width: 100%;
    padding: 12px 18px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ---- Category Filter ---- */
  .filter-wrap {
    max-width: 1100px;
    margin: 16px auto 0;
    padding: 0 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-soft);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .filter-chip.active, .filter-chip:hover {
    border-color: var(--accent);
    color: white;
    background: var(--accent);
  }

  /* ---- Grid ---- */
  .grid {
    max-width: 1100px;
    margin: 28px auto 60px;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ---- Link Card ---- */
  .link-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: all 0.22s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--card-color, #6c63ff) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.22s;
  }

  .link-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    background: var(--bg-card-hover);
  }

  .link-card:hover::before { opacity: 0.07; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-icon {
    font-size: 34px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .link-card:hover .card-actions { opacity: 1; }

  .card-action-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 8px;
    color: var(--text-soft);
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    text-decoration: none;
  }

  .card-action-btn:hover { background: rgba(255,255,255,0.16); color: white; }
  .card-action-btn.danger:hover { background: rgba(255,101,132,0.25); color: #ff6584; }

  .card-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }

  .card-category {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-url {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  /* ---- Empty ---- */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { font-size: 20px; color: var(--text-soft); margin-bottom: 8px; }

  /* ---- Modal ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 18px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input, .form-select, .form-textarea {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    transition: border-color 0.18s;
    outline: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }

  .form-select option { background: #1a1d27; }

  .form-textarea { resize: vertical; min-height: 70px; }

  /* Icon picker */
  .icon-picker-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: block;
  }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
    padding: 4px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .icon-option {
    font-size: 24px;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    user-select: none;
  }

  .icon-option:hover { background: rgba(108,99,255,0.15); border-color: var(--accent); }
  .icon-option.selected { background: rgba(108,99,255,0.25); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }

  .custom-icon-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
  }

  .custom-icon-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 20px;
    text-align: center;
    padding: 8px;
    outline: none;
    width: 60px;
    transition: border-color 0.18s;
  }

  .custom-icon-input:focus { border-color: var(--accent); }

  .custom-icon-preview {
    font-size: 30px;
    width: 46px;
    text-align: center;
  }

  /* Color accent picker */
  .color-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }

  .color-swatch:hover, .color-swatch.selected {
    transform: scale(1.2);
    border-color: white;
  }

  /* Modal buttons */
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 14px rgba(108,99,255,0.4);
  }

  .btn-primary:hover { background: #7b73ff; transform: translateY(-1px); }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text-soft);
    border: 1.5px solid var(--border);
  }

  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .btn-danger {
    background: rgba(255,101,132,0.15);
    color: #ff6584;
    border: 1.5px solid rgba(255,101,132,0.3);
  }

  .btn-danger:hover { background: rgba(255,101,132,0.25); }

  /* Count display */
  .count-badge {
    font-size: 13px;
    color: var(--text-muted);
    padding: 0 32px;
    max-width: 1100px;
    margin: 20px auto 0;
  }

  @media (max-width: 600px) {
    header, .search-wrap, .filter-wrap, .grid, .count-badge { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
    .modal { padding: 24px 18px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">рЯФЧ „Ф„Ь„Щ„†„І„Щ„Э „©„Ь„Щ</div>
    <div class="header-sub">„Ы„Ь „Ф„У„С„®„Щ„Э „©„Щ„¶„®„™, „С„Ю„І„Х„Э „Р„Ч„У</div>
  </div>
  <button class="add-btn" onclick="openModal()">

<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text" placeholder="рЯФН  „Ч„§„© „Ь„§„Щ „©„Э, „™„Щ„Р„Х„® „Р„Х „Ы„™„Х„С„™..." oninput="render()">

      <textarea class="form-textarea" id="fDesc" placeholder="„С„Ю„Ф „Ц„Ф „©„Щ„Ю„Х„©„Щ..."></textarea>

        <input class="form-input" id="fCat" type="text" list="catList" placeholder="„Ь„У„Х„Т„Ю„Ф: „Ы„Ь„Щ„Э, „§„®„Х„Щ„І„Ш„Щ„Э, „Ю„°„Ю„Ы„Щ„Э">

      <div class="custom-icon-row">
        <span style="font-size:13px;color:var(--text-soft);">„Р„Щ„Щ„І„Х„Я „Ю„Х„™„Р„Э:</span>
        <input class="custom-icon-input" id="fCustomIcon" maxlength="4" placeholder="рЯШК">

    <div class="modal-actions">

      <button class="btn btn-primary" id="saveBtn" onclick="saveLink()">„©„Ю„Х„®</button>

<script>
// вФАвФАвФА Data вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const STORAGE_KEY = 'my_links_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function save(links) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
}

let links = load();

// вФАвФАвФА Icons вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const ICONS = [
  'рЯФЧ','рЯУД','рЯЧВпЄП','рЯУБ','рЯМР','рЯЫ†пЄП','вЪЩпЄП','рЯФІ','рЯТ°','рЯО®','рЯУК','рЯУИ','рЯУЭ','вЬПпЄП','рЯУМ','рЯУН',
  'рЯЪА','в≠Р','рЯТО','рЯФ•','рЯОѓ','рЯОЙ','рЯІ†','рЯТї','рЯУ±','рЯЦ•пЄП','рЯЦ®пЄП','вМ®пЄП','рЯЦ±пЄП','рЯУЈ','рЯОђ','рЯОµ',
  'рЯУЪ','рЯЧЇпЄП','рЯІ©','рЯФС','рЯПЖ','рЯМЯ','рЯТђ','рЯУІ','рЯУЮ','рЯФФ','рЯЫ°пЄП','рЯФР','рЯМИ','рЯМњ','рЯП†','рЯПЧпЄП',
  'рЯ§Ц','рЯФђ','рЯІ™','рЯУ°','рЯЧГпЄП','рЯЦЉпЄП','рЯО≠','рЯІ∞','рЯМН','рЯЫТ','рЯУ¶','рЯФН','рЯТЊ','рЯЦКпЄП','рЯЧТпЄП','вЬЕ'
];

const COLORS = [
  '#6c63ff','#ff6584','#43e97b','#f7971e','#2196f3','#e91e63',
  '#00bcd4','#ff9800','#9c27b0','#4caf50','#f44336','#607d8b'
];

// вФАвФАвФА State for modal вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
let editingId = null;
let selectedIcon = 'рЯФЧ';
let selectedColor = COLORS[0];

// вФАвФАвФА Build icon grid вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function buildIconGrid() {
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = ICONS.map(ic =>
    `<div class="icon-option${ic === selectedIcon ? ' selected' : ''}" data-icon="${ic}" onclick="selectIcon('${ic}')">${ic}</div>`
  ).join('');
}

function selectIcon(ic) {
  selectedIcon = ic;
  document.getElementById('fCustomIcon').value = ic;
  document.getElementById('iconPreview').textContent = ic;
  document.querySelectorAll('.icon-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.icon === ic);
  });
}

// вФАвФАвФА Build color row вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function buildColorRow() {
  const row = document.getElementById('colorRow');
  row.innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c === selectedColor ? ' selected' : ''}" data-color="${c}"
      style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === c);
  });
}

// вФАвФАвФА Custom icon input вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
document.getElementById('fCustomIcon').addEventListener('input', function() {
  const val = this.value.trim();
  if (val) {
    selectedIcon = val;
    document.getElementById('iconPreview').textContent = val;
    document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
  }
});

// вФАвФАвФА Category filter вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
let activeFilter = '„Ф„Ы„Х„Ь';

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  render();
}

function updateFilters() {
  const cats = ['„Ф„Ы„Х„Ь', ...new Set(links.map(l => l.cat).filter(Boolean))];
  const wrap = document.getElementById('filterWrap');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-chip${c === activeFilter ? ' active' : ''}" data-cat="${c}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  // Update datalist
  const dl = document.getElementById('catList');
  dl.innerHTML = [...new Set(links.map(l => l.cat).filter(Boolean))].map(c => `<option value="${c}">`).join('');
}

// вФАвФАвФА Render grid вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = links;

  if (activeFilter !== '„Ф„Ы„Х„Ь') {
    filtered = filtered.filter(l => l.cat === activeFilter);
  }

  if (q) {
    filtered = filtered.filter(l =>
      (l.name || '').toLowerCase().includes(q) ||
      (l.desc || '').toLowerCase().includes(q) ||
      (l.url  || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('countBadge').textContent =
    filtered.length === links.length
      ? `${links.length} „Ь„Щ„†„І„Щ„Э`
      : `${filtered.length} „Ю„™„Х„Ъ ${links.length}`;

  const grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">${links.length === 0 ? 'рЯФЧ' : 'рЯФН'}</div>
      <div class="empty-title">${links.length === 0 ? '„Ґ„У„Щ„Щ„Я „Р„Щ„Я „Ь„Щ„†„І„Щ„Э' : '„Ь„Р „†„Ю„¶„Р„Х „™„Х„¶„Р„Х„™'}</div>
      <div style="color:var(--text-muted);font-size:14px;">${links.length === 0 ? '„Ь„Ч„• „Ґ„Ь "„Ф„Х„°„£ „Ь„Щ„†„І" „Ы„У„Щ „Ь„Ф„™„Ч„Щ„Ь' : '„†„°„Ф „Ь„Ч„§„© „Ю„©„Ф„Х „Р„Ч„®'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => {
    const host = (() => { try { return new URL(l.url).hostname.replace('www.',''); } catch { return l.url; } })();
    const catColor = l.color || COLORS[0];
    const catStyle = `color:${catColor};border-color:${catColor};background:${catColor}18`;

    return `<div class="link-card" style="--card-color:${catColor}" onclick="openLink('${l.id}')">
      <div class="card-top">
        <div class="card-icon">${l.icon || 'рЯФЧ'}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <a class="card-action-btn" href="${l.url}" target="_blank" rel="noopener" title="„§„™„Ч „Ь„Щ„†„І">вЖЧ</a>
          <button class="card-action-btn" onclick="openEdit('${l.id}')" title="„Ґ„®„Х„Ъ">вЬО</button>
          <button class="card-action-btn danger" onclick="confirmDelete('${l.id}')" title="„Ю„Ч„І">вЬХ</button>
        </div>
      </div>
      <div>
        <div class="card-name">${l.name}</div>
        ${l.desc ? `<div class="card-desc">${l.desc}</div>` : ''}
      </div>
      <div class="card-bottom">
        ${l.cat ? `<span class="card-category" style="${catStyle}">${l.cat}</span>` : '<span></span>'}
        <span class="card-url">${host}</span>
      </div>
    </div>`;
  }).join('');
}

function openLink(id) {
  const l = links.find(x => x.id === id);
  if (l) window.open(l.url, '_blank', 'noopener');
}

// вФАвФАвФА Modal вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function openModal() {
  editingId = null;
  selectedIcon = 'рЯФЧ';
  selectedColor = COLORS[0];
  document.getElementById('modalTitle').textContent = '„Ф„Х„°„£ „Ь„Щ„†„І „Ч„У„©';
  document.getElementById('fName').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fCat').value = '';
  document.getElementById('fCustomIcon').value = '';
  document.getElementById('iconPreview').textContent = 'рЯФЧ';
  document.getElementById('deleteBtn').classList.add('hidden');
  buildIconGrid();
  buildColorRow();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function openEdit(id) {
  const l = links.find(x => x.id === id);
  if (!l) return;
  editingId = id;
  selectedIcon = l.icon || 'рЯФЧ';
  selectedColor = l.color || COLORS[0];
  document.getElementById('modalTitle').textContent = '„Ґ„®„Х„Ъ „Ь„Щ„†„І';
  document.getElementById('fName').value = l.name || '';
  document.getElementById('fUrl').value = l.url || '';
  document.getElementById('fDesc').value = l.desc || '';
  document.getElementById('fCat').value = l.cat || '';
  document.getElementById('fCustomIcon').value = l.icon || '';
  document.getElementById('iconPreview').textContent = l.icon || 'рЯФЧ';
  document.getElementById('deleteBtn').classList.remove('hidden');
  buildIconGrid();
  buildColorRow();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function closeModalIfOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveLink() {
  const name = document.getElementById('fName').value.trim();
  const url  = document.getElementById('fUrl').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  if (!url)  { document.getElementById('fUrl').focus(); return; }

  const entry = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name,
    url,
    desc:  document.getElementById('fDesc').value.trim(),
    cat:   document.getElementById('fCat').value.trim(),
    icon:  selectedIcon,
    color: selectedColor,
    added: editingId ? (links.find(l=>l.id===editingId)?.added || Date.now()) : Date.now()
  };

  if (editingId) {
    links = links.map(l => l.id === editingId ? entry : l);
  } else {
    links.push(entry);
  }

  save(links);
  closeModal();
  updateFilters();
  render();
}

function confirmDelete(id) {
  editingId = id;
  deleteLink();
}

function deleteLink() {
  if (!editingId) return;
  if (!confirm('„Ь„Ю„Ч„Х„І „Р„™ „Ф„Ь„Щ„†„І „Ф„Ц„Ф?')) return;
  links = links.filter(l => l.id !== editingId);
  save(links);
  closeModal();
  updateFilters();
  render();
}

// вФАвФАвФА Keyboard вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if (document.getElementById('overlay').classList.contains('open')) saveLink();
  }
});

// вФАвФАвФА Init вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
updateFilters();
render();
</script>
</body>
</html>
