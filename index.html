<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --bg-card: #1a1d27; --bg-card-hover: #21253a;
    --border: #2a2f45; --border-hover: #4a5280; --accent: #6c63ff;
    --text: #e8eaf6; --text-soft: #9ca3c8; --text-muted: #5a6080;
    --shadow: 0 4px 24px rgba(0,0,0,0.4); --radius: 16px;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 40px 32px 0; max-width: 1100px; margin: 0 auto;

  }
  .header-title {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, #6c63ff, #ff6584);

  }
  .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .add-btn {

    background: var(--accent); color: white; border: none; border-radius: 12px;
    font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.5); background: #7b73ff; }

  .save-btn {
    display: flex; align-items: center; gap: 8px; padding: 12px 18px;
    background: #1a2a1a; color: #43e97b; border: 1.5px solid #43e97b44;
    border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .save-btn:hover { background: #1f351f; box-shadow: 0 4px 16px rgba(67,233,123,0.25); }
  .save-btn.saved { color: #fff; background: #2d6a4f; border-color: #43e97b; }

  .save-notice {
    max-width: 1100px; margin: 16px auto 0; padding: 0 32px;
  }
  .notice-bar {
    background: #1a1f35; border: 1.5px solid #6c63ff44; border-radius: 10px;
    padding: 10px 16px; font-size: 13px; color: var(--text-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .notice-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #43e97b; flex-shrink: 0; }
  .notice-bar .dot.dirty { background: #f7971e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .search-wrap { max-width: 1100px; margin: 20px auto 0; padding: 0 32px; }
  .search-input {
    width: 100%; padding: 12px 18px; background: var(--bg-card);
    border: 1.5px solid var(--border); border-radius: 12px; color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 14px; transition: border-color 0.2s; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-wrap { max-width: 1100px; margin: 14px auto 0; padding: 0 32px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-soft); font-family: 'Heebo', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.18s;
  }
  .filter-chip.active, .filter-chip:hover { border-color: var(--accent); color: white; background: var(--accent); }

  .grid {
    max-width: 1100px; margin: 24px auto 60px; padding: 0 32px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px;
  }

  .link-card {
    background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 22px; color: var(--text); display: flex; flex-direction: column; gap: 14px;
    transition: all 0.22s; position: relative; overflow: hidden; cursor: pointer;
  }
  .link-card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--card-color, #6c63ff) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.22s;
  }
  .link-card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: var(--shadow); background: var(--bg-card-hover); }
  .link-card:hover::before { opacity: 0.07; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-icon { font-size: 34px; line-height: 1; flex-shrink: 0; }
  .card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.18s; }

  .card-action-btn {
    background: rgba(255,255,255,0.08); border: none; border-radius: 8px;

  .card-action-btn:hover { background: rgba(255,255,255,0.16); color: white; }
  .card-action-btn.danger:hover { background: rgba(255,101,132,0.25); color: #ff6584; }
  .card-name { font-size: 17px; font-weight: 700; line-height: 1.3; }

  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { font-size: 20px; color: var(--text-soft); margin-bottom: 8px; }

  .overlay {

  .form-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }

  .icon-grid {

  .icon-option:hover { background: rgba(108,99,255,0.15); border-color: var(--accent); }
  .icon-option.selected { background: rgba(108,99,255,0.25); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }

  .custom-icon-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }

  .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s; }

</style>

<!-- вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

<script>
// вФАвФА „І„®„Щ„Р„™ „Ф„†„™„Х„†„Щ„Э „Ф„Ю„Х„Ш„Ю„Ґ„Щ„Э вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function loadEmbedded() {
  try {
    return JSON.parse(document.getElementById('linksData').textContent) || [];
  } catch { return []; }
}

let links = loadEmbedded();
let isDirty = false;

// вФАвФА „І„С„Х„Ґ„Щ„Э вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const ICONS = [
  'рЯФЧ','рЯУД','рЯЧВпЄП','рЯУБ','рЯМР','рЯЫ†пЄП','вЪЩпЄП','рЯФІ','рЯТ°','рЯО®','рЯУК','рЯУИ','рЯУЭ','вЬПпЄП','рЯУМ','рЯУН',
  'рЯЪА','в≠Р','рЯТО','рЯФ•','рЯОѓ','рЯОЙ','рЯІ†','рЯТї','рЯУ±','рЯЦ•пЄП','рЯЦ®пЄП','вМ®пЄП','рЯЦ±пЄП','рЯУЈ','рЯОђ','рЯОµ',
  'рЯУЪ','рЯЧЇпЄП','рЯІ©','рЯФС','рЯПЖ','рЯМЯ','рЯТђ','рЯУІ','рЯУЮ','рЯФФ','рЯЫ°пЄП','рЯФР','рЯМИ','рЯМњ','рЯП†','рЯПЧпЄП',
  'рЯ§Ц','рЯФђ','рЯІ™','рЯУ°','рЯЧГпЄП','рЯЦЉпЄП','рЯО≠','рЯІ∞','рЯМН','рЯЫТ','рЯУ¶','рЯФН','рЯТЊ','рЯЦКпЄП','рЯЧТпЄП','вЬЕ'
];
const COLORS = [
  '#6c63ff','#ff6584','#43e97b','#f7971e','#2196f3','#e91e63',
  '#00bcd4','#ff9800','#9c27b0','#4caf50','#f44336','#607d8b'
];

let editingId = null, selectedIcon = 'рЯФЧ', selectedColor = COLORS[0];

// вФАвФА „©„Ю„Щ„®„™ „І„Х„С„• („Ф„Х„®„У„™ HTML „Ю„Ґ„Х„У„Ы„Я) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function saveFile() {
  const html = document.documentElement.outerHTML;
  const jsonStr = JSON.stringify(links, null, 2);
  // „Ю„Ч„Ь„Щ„£ „Р„™ „™„Х„Ы„Я „™„Т „Ф-script „©„Ь „Ф„†„™„Х„†„Щ„Э
  const updated = html.replace(
    /(<script id="linksData"[^>]*>)([\s\S]*?)(<\/script>)/,
    `$1\n${jsonStr}\n$3`
  );
  const blob = new Blob([updated], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'links.html';
  a.click();
  URL.revokeObjectURL(a.href);

  isDirty = false;
  updateStatus(false);

  const btn = document.getElementById('saveFileBtn');
  btn.textContent = 'вЬУ „†„©„Ю„®!';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'рЯТЊ „©„Ю„Х„® „І„Х„С„•'; btn.classList.remove('saved'); }, 2000);
}

function markDirty() {
  isDirty = true;
  updateStatus(true);
}

function updateStatus(dirty) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (dirty) {
    dot.classList.add('dirty');
    txt.textContent = '„Щ„© „©„Щ„†„Х„Щ„Щ„Э „©„Ь„Р „†„©„Ю„®„Х вАФ „Ь„Ч„• "„©„Ю„Х„® „І„Х„С„•" „Ы„У„Щ „Ь„©„Ю„® „Х„Ь„Ф„Ґ„Ь„Х„™ „Ь„Т„Щ„Ш„Ф„Р„С';
  } else {
    dot.classList.remove('dirty');
    txt.textContent = `${links.length} „Ь„Щ„†„І„Щ„Э „©„Ю„Х„®„Щ„Э „С„І„Х„С„• вАФ „Р„Ч„®„Щ „©„Ю„Щ„®„Ф, „Ф„Ґ„Ь„Ф „Р„™ „Ф„І„Х„С„• „Ь„Т„Щ„Ш„Ф„Р„С`;
  }
}

// вФАвФА „Т„®„Щ„У „Р„Щ„Щ„І„Х„†„Щ„Э вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function buildIconGrid() {
  document.getElementById('iconGrid').innerHTML = ICONS.map(ic =>
    `<div class="icon-option${ic===selectedIcon?' selected':''}" data-icon="${ic}" onclick="selectIcon('${ic}')">${ic}</div>`
  ).join('');
}
function selectIcon(ic) {
  selectedIcon = ic;
  document.getElementById('fCustomIcon').value = ic;
  document.getElementById('iconPreview').textContent = ic;
  document.querySelectorAll('.icon-option').forEach(el => el.classList.toggle('selected', el.dataset.icon===ic));
}
function buildColorRow() {
  document.getElementById('colorRow').innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c===selectedColor?' selected':''}" data-color="${c}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}
function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.toggle('selected', el.dataset.color===c));
}

document.getElementById('fCustomIcon').addEventListener('input', function() {
  const v = this.value.trim();
  if (v) {
    selectedIcon = v;
    document.getElementById('iconPreview').textContent = v;
    document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
  }
});

// вФАвФА „§„Щ„Ь„Ш„® „І„Ш„Т„Х„®„Щ„Х„™ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
let activeFilter = '„Ф„Ы„Х„Ь';
function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.toggle('active', el.dataset.cat===cat));
  render();
}
function updateFilters() {
  const cats = ['„Ф„Ы„Х„Ь', ...new Set(links.map(l => l.cat).filter(Boolean))];
  document.getElementById('filterWrap').innerHTML = cats.map(c =>
    `<button class="filter-chip${c===activeFilter?' active':''}" data-cat="${c}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
  document.getElementById('catList').innerHTML = [...new Set(links.map(l=>l.cat).filter(Boolean))].map(c=>`<option value="${c}">`).join('');
}

// вФАвФА „®„Щ„†„У„Х„® „Т„®„Щ„У вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = links;
  if (activeFilter !== '„Ф„Ы„Х„Ь') filtered = filtered.filter(l => l.cat===activeFilter);
  if (q) filtered = filtered.filter(l =>
    (l.name||'').toLowerCase().includes(q) ||
    (l.desc||'').toLowerCase().includes(q) ||
    (l.url||'').toLowerCase().includes(q)
  );
  document.getElementById('countBadge').textContent =
    filtered.length===links.length ? `${links.length} „Ь„Щ„†„І„Щ„Э` : `${filtered.length} „Ю„™„Х„Ъ ${links.length}`;

  const grid = document.getElementById('grid');
  if (filtered.length===0) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">${links.length===0?'рЯФЧ':'рЯФН'}</div>
      <div class="empty-title">${links.length===0?'„Ґ„У„Щ„Щ„Я „Р„Щ„Я „Ь„Щ„†„І„Щ„Э':'„Ь„Р „†„Ю„¶„Р„Х „™„Х„¶„Р„Х„™'}</div>
      <div style="color:var(--text-muted);font-size:14px;">${links.length===0?'„Ь„Ч„• „Ґ„Ь "„Ф„Х„°„£ „Ь„Щ„†„І" „Ы„У„Щ „Ь„Ф„™„Ч„Щ„Ь':'„†„°„Ф „Ь„Ч„§„© „Ю„©„Ф„Х „Р„Ч„®'}</div>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(l => {
    const host = (() => { try { return new URL(l.url).hostname.replace('www.',''); } catch { return l.url; } })();
    const cc = l.color || COLORS[0];
    return `<div class="link-card" style="--card-color:${cc}" onclick="openLink('${l.id}')">
      <div class="card-top">
        <div class="card-icon">${l.icon||'рЯФЧ'}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <a class="card-action-btn" href="${l.url}" target="_blank" rel="noopener" title="„§„™„Ч">вЖЧ</a>
          <button class="card-action-btn" onclick="openEdit('${l.id}')" title="„Ґ„®„Х„Ъ">вЬО</button>
          <button class="card-action-btn danger" onclick="confirmDelete('${l.id}')" title="„Ю„Ч„І">вЬХ</button>
        </div>
      </div>
      <div>
        <div class="card-name">${l.name}</div>
        ${l.desc?`<div class="card-desc">${l.desc}</div>`:''}
      </div>
      <div class="card-bottom">
        ${l.cat?`<span class="card-category" style="color:${cc};border-color:${cc};background:${cc}18">${l.cat}</span>`:'<span></span>'}
        <span class="card-url">${host}</span>
      </div>
    </div>`;
  }).join('');
}

function openLink(id) {
  const l = links.find(x => x.id===id);
  if (l) window.open(l.url, '_blank', 'noopener');
}

// вФАвФА „Ю„Х„У„Р„Ь вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function openModal() {
  editingId=null; selectedIcon='рЯФЧ'; selectedColor=COLORS[0];
  document.getElementById('modalTitle').textContent='„Ф„Х„°„£ „Ь„Щ„†„І „Ч„У„©';
  ['fName','fUrl','fDesc','fCat','fCustomIcon'].forEach(id => document.getElementById(id).value='');
  document.getElementById('iconPreview').textContent='рЯФЧ';
  document.getElementById('deleteBtn').classList.add('hidden');
  buildIconGrid(); buildColorRow();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}
function openEdit(id) {
  const l = links.find(x => x.id===id); if(!l) return;
  editingId=id; selectedIcon=l.icon||'рЯФЧ'; selectedColor=l.color||COLORS[0];
  document.getElementById('modalTitle').textContent='„Ґ„®„Х„Ъ „Ь„Щ„†„І';
  document.getElementById('fName').value=l.name||'';
  document.getElementById('fUrl').value=l.url||'';
  document.getElementById('fDesc').value=l.desc||'';
  document.getElementById('fCat').value=l.cat||'';
  document.getElementById('fCustomIcon').value=l.icon||'';
  document.getElementById('iconPreview').textContent=l.icon||'рЯФЧ';
  document.getElementById('deleteBtn').classList.remove('hidden');
  buildIconGrid(); buildColorRow();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalIfOutside(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function saveLink() {
  const name = document.getElementById('fName').value.trim();
  const url  = document.getElementById('fUrl').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  if (!url)  { document.getElementById('fUrl').focus(); return; }
  const entry = {
    id: editingId || Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name, url,
    desc:  document.getElementById('fDesc').value.trim(),
    cat:   document.getElementById('fCat').value.trim(),
    icon:  selectedIcon,
    color: selectedColor,
    added: editingId ? (links.find(l=>l.id===editingId)?.added||Date.now()) : Date.now()
  };
  links = editingId ? links.map(l => l.id===editingId ? entry : l) : [...links, entry];
  closeModal(); markDirty(); updateFilters(); render();
}
function confirmDelete(id) { editingId=id; deleteLink(); }
function deleteLink() {
  if (!editingId) return;
  if (!confirm('„Ь„Ю„Ч„Х„І „Р„™ „Ф„Ь„Щ„†„І „Ф„Ц„Ф?')) return;
  links = links.filter(l => l.id!==editingId);
  closeModal(); markDirty(); updateFilters(); render();
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter' && document.getElementById('overlay').classList.contains('open')) saveLink();
});

// вФАвФА „Р„™„Ч„Х„Ь вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
updateFilters();
render();
updateStatus(false);
</script>
</body>
</html>
